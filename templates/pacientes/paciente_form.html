{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow-sm">
            <div class="card-header bg-primary text-white">
                <h5 class="mb-0">Registrar Nueva Mascota</h5>
            </div>
            <div class="card-body">
                <form method="POST">
                    {% csrf_token %}
                    <!-- Renderizamos el formulario usando as_p para que cada campo esté en un párrafo separado que preparamos en forms.py -->
                    {{ form.as_p }}

                    <button type="submit" class="btn btn-success">Guardar</button>
                    <a href="{% url 'paciente_list' %}" class="btn btn-secondary">Cancelar</a>
                </form>
            </div>
        </div>
    </div>
    {% endblock %}
